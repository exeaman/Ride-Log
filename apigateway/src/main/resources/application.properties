spring.application.name=apigateway
server.port=8080

spring.cloud.gateway.routes[0].id=rideservice
spring.cloud.gateway.routes[0].uri=${RIDE_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/bikes/**,/rides/**

spring.cloud.gateway.routes[1].id=analyticsservice
spring.cloud.gateway.routes[1].uri=${ANALYTICS_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/analytics/**

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=${FRONTEND_URL:http://localhost:5173}

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true